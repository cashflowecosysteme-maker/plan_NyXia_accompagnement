<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Journal de Réflexion — NyXia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --p:#7B5CFF; --p2:#5A6CFF; --p3:#a78bfa; }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; overflow:hidden; background:#060a18; font-family:'Outfit',sans-serif; color:#fff; }

    .bg {
      position:fixed; inset:0; z-index:0;
      background:
        radial-gradient(ellipse 80% 60% at 40% 50%, rgba(50,15,110,0.6) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 80% 20%, rgba(30,10,80,0.35) 0%, transparent 60%),
        #060a18;
    }

    .particles { position:fixed; inset:0; z-index:1; pointer-events:none; overflow:hidden; }
    .particle { position:absolute; border-radius:50%; opacity:0; animation:floatUp linear infinite; }
    @keyframes floatUp {
      0% { opacity:0; transform:translateY(0) scale(0); }
      10% { opacity:0.5; }
      90% { opacity:0.15; }
      100% { opacity:0; transform:translateY(-100vh) scale(1.5); }
    }

    .scene {
      position:relative; z-index:2; width:100%; height:100vh;
      display:flex; align-items:center; justify-content:center;
      flex-direction:row-reverse; /* NyXia à droite */
    }

    .nyxia-side {
      position:relative; flex-shrink:0; width:480px; height:100vh;
      display:flex; align-items:center; justify-content:center;
      animation:nyxiaIn 1.2s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes nyxiaIn { from { opacity:0; transform:translateX(40px); } to { opacity:1; transform:none; } }

    .nyxia-glow {
      position:absolute; top:50%; left:50%;
      transform:translate(-50%,-50%);
      width:400px; height:500px;
      background:radial-gradient(ellipse 70% 80% at 50% 50%,
        rgba(100,60,200,0.5) 0%, rgba(123,92,255,0.25) 35%,
        rgba(60,20,120,0.1) 60%, transparent 75%);
      filter:blur(28px);
      animation:glowPulse 3.5s ease-in-out infinite;
      z-index:1;
    }
    @keyframes glowPulse {
      0%,100% { opacity:0.75; transform:translate(-50%,-50%) scale(1); }
      50% { opacity:1; transform:translate(-50%,-50%) scale(1.06); }
    }

    .nyxia-floor-glow {
      position:absolute; bottom:80px; left:50%;
      transform:translateX(-50%);
      width:260px; height:35px;
      background:radial-gradient(ellipse 100% 100% at 50% 50%, rgba(100,60,200,0.5), transparent 70%);
      filter:blur(14px); border-radius:50%; z-index:0;
      animation:glowPulse 3.5s ease-in-out infinite;
    }

    .nyxia-img {
      position:relative; z-index:2;
      height:80vh; max-height:720px;
      object-fit:contain;
      filter:drop-shadow(0 0 40px rgba(100,60,200,0.55)) drop-shadow(0 0 80px rgba(123,92,255,0.2));
      animation:nyxiaFloat 4.5s ease-in-out infinite;
    }
    @keyframes nyxiaFloat {
      0%,100% { transform:translateY(0px); }
      50% { transform:translateY(-12px); }
    }

    .content-side {
      flex:1; max-width:480px; padding:0 48px;
      animation:contentIn 1.4s cubic-bezier(0.22,1,0.36,1) 0.2s both;
    }
    @keyframes contentIn { from { opacity:0; transform:translateX(-30px); } to { opacity:1; transform:none; } }

    .eyebrow { font-size:11px; font-weight:600; letter-spacing:3px; text-transform:uppercase; color:var(--p3); margin-bottom:16px; opacity:0.8; }

    .title { font-family:'Cormorant Garamond',serif; font-size:clamp(34px,5vw,54px); font-weight:300; line-height:1.1; color:#fff; margin-bottom:16px; }
    .title em { font-style:italic; background:linear-gradient(135deg,#c4b5fd,var(--p3),#a78bfa); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }

    .subtitle { font-size:15px; color:rgba(214,217,240,0.65); line-height:1.8; margin-bottom:40px; font-weight:300; max-width:380px; }

    .btn-glass {
      position:relative; display:inline-flex; align-items:center; gap:14px;
      padding:18px 40px; border-radius:60px; text-decoration:none;
      font-family:'Outfit',sans-serif; font-size:16px; font-weight:600; color:#fff;
      cursor:pointer; border:1px solid rgba(163,139,250,0.35);
      background:rgba(100,60,200,0.12);
      backdrop-filter:blur(20px) saturate(1.5);
      box-shadow:inset 0 1px 0 rgba(255,255,255,0.12), 0 8px 32px rgba(0,0,0,0.3), 0 0 40px rgba(100,60,200,0.2);
      transition:all 0.35s cubic-bezier(0.22,1,0.36,1); overflow:hidden;
    }
    .btn-glass::before { content:''; position:absolute; top:0; left:0; right:0; height:50%; background:linear-gradient(to bottom,rgba(255,255,255,0.08),transparent); border-radius:60px 60px 0 0; pointer-events:none; }
    .btn-glass::after { content:''; position:absolute; top:-50%; left:-60%; width:40%; height:200%; background:linear-gradient(105deg,transparent,rgba(255,255,255,0.15),transparent); transform:skewX(-15deg); transition:left 0.5s ease; pointer-events:none; }
    .btn-glass:hover::after { left:130%; }
    .btn-glass:hover { background:rgba(100,60,200,0.22); border-color:rgba(196,181,253,0.6); box-shadow:0 0 0 4px rgba(100,60,200,0.12), 0 0 60px rgba(100,60,200,0.5); transform:translateY(-3px) scale(1.02); }

    .btn-icon { font-size:22px; filter:drop-shadow(0 0 8px rgba(196,181,253,0.9)); flex-shrink:0; }
    .btn-text-wrap { display:flex; flex-direction:column; align-items:flex-start; gap:1px; }
    .btn-label { font-size:16px; font-weight:600; }
    .btn-sub { font-size:11px; font-weight:400; color:rgba(214,217,240,0.6); letter-spacing:0.5px; }
    .btn-arrow { margin-left:auto; font-size:18px; opacity:0.6; transition:transform 0.3s ease, opacity 0.3s ease; }
    .btn-glass:hover .btn-arrow { transform:translateX(4px); opacity:1; }

    .badge-wrap { display:flex; align-items:center; gap:10px; margin-top:24px; }
    .badge { display:inline-flex; align-items:center; gap:6px; padding:5px 12px; border-radius:50px; font-size:11px; font-weight:500; color:rgba(214,217,240,0.6); border:1px solid rgba(100,60,200,0.2); background:rgba(100,60,200,0.07); }
    .badge::before { content:''; width:5px; height:5px; border-radius:50%; background:var(--dot-color,#a78bfa); flex-shrink:0; }

    @media(max-width:860px) {
      .scene { flex-direction:column; justify-content:flex-end; }
      .nyxia-side { width:100%; height:52vh; }
      .nyxia-img { height:50vh; }
      .content-side { padding:0 24px 40px; text-align:center; max-width:100%; }
      .subtitle { margin:0 auto 32px; }
      .badge-wrap { justify-content:center; }
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="particles" id="particles"></div>

  <div class="scene">
    <div class="nyxia-side">
      <div class="nyxia-glow"></div>
      <div class="nyxia-floor-glow"></div>
      <img src="/NyXia_-_Journal_de_Réflexion_transparent.png" alt="NyXia — Journal de Réflexion" class="nyxia-img">
    </div>
    <div class="content-side">
      <div class="eyebrow">📖 Espace d'Intégration</div>
      <h1 class="title">Journal de<br><em>Réflexion</em></h1>
      <p class="subtitle">
        Un espace intime pour poser ce que tu portes — en mots.<br>
        NyXia t'accompagne à écrire ce que tu n'oses pas toujours te dire.<br>
        Pas pour analyser. Pour déposer. 💜
      </p>
      <button class="btn-glass" onclick="sendToNyXia()">
        <span class="btn-icon">📖</span>
        <span class="btn-text-wrap">
          <span class="btn-label">Ouvrir mon journal avec NyXia</span>
          <span class="btn-sub">Écriture intuitive · Espace de dépôt</span>
        </span>
        <span class="btn-arrow">→</span>
      </button>
      <div class="badge-wrap">
        <span class="badge" style="--dot-color:#c4b5fd">📖 Intégration</span>
        <span class="badge" style="--dot-color:#F4C842">✦ Plan Accompagnement</span>
      </div>
    </div>
  </div>

  <script>
    const container = document.getElementById('particles');
    const colors = ['#c4b5fd','#a78bfa','#7B5CFF','#e9d5ff','#ffffff'];
    for (let i = 0; i < 25; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 2.5 + 0.8;
      p.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;bottom:${Math.random()*-20}%;animation-duration:${Math.random()*14+9}s;animation-delay:${Math.random()*12}s;`;
      p.style.background = colors[Math.floor(Math.random()*colors.length)];
      container.appendChild(p);
    }

    function sendToNyXia() {
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({ type: 'nyxia_suggest', text: 'Je voudrais écrire dans mon journal aujourd\'hui. Aide-moi à poser ce que je porte en mots.' }, '*');
      }
    }
  </script>
</body>
</html>
