<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercices Neuro-Alchimiques — NyXia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --p:#7B5CFF; --p2:#5A6CFF; --p3:#a78bfa; }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; overflow:hidden; background:#060a18; font-family:'Outfit',sans-serif; color:#fff; }
    .bg { position:fixed; inset:0; z-index:0; background: radial-gradient(ellipse 80% 60% at 60% 50%, rgba(60,20,120,0.55) 0%, transparent 70%), radial-gradient(ellipse 50% 40% at 20% 80%, rgba(30,10,80,0.4) 0%, transparent 60%), #060a18; }
    .particles { position:fixed; inset:0; z-index:1; pointer-events:none; overflow:hidden; }
    .particle { position:absolute; border-radius:50%; opacity:0; animation:floatUp linear infinite; }
    @keyframes floatUp { 0%{opacity:0;transform:translateY(0) scale(0);} 10%{opacity:0.6;} 90%{opacity:0.2;} 100%{opacity:0;transform:translateY(-100vh) scale(1.5);} }
    .scene { position:relative; z-index:2; width:100%; height:100vh; display:flex; align-items:center; justify-content:center; }
    .nyxia-side { position:relative; flex-shrink:0; width:480px; height:100vh; display:flex; align-items:center; justify-content:center; animation:nyxiaIn 1.2s cubic-bezier(0.22,1,0.36,1) both; }
    @keyframes nyxiaIn { from{opacity:0;transform:translateX(-40px);} to{opacity:1;transform:none;} }
    .nyxia-glow { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:420px; height:520px; background:radial-gradient(ellipse 70% 80% at 50% 50%, rgba(123,92,255,0.45) 0%, rgba(90,108,255,0.25) 30%, rgba(60,20,120,0.1) 60%, transparent 75%); filter:blur(24px); animation:glowPulse 3s ease-in-out infinite; z-index:1; }
    @keyframes glowPulse { 0%,100%{opacity:0.8;transform:translate(-50%,-50%) scale(1);} 50%{opacity:1;transform:translate(-50%,-50%) scale(1.05);} }
    .nyxia-floor-glow { position:absolute; bottom:80px; left:50%; transform:translateX(-50%); width:300px; height:40px; background:radial-gradient(ellipse 100% 100% at 50% 50%, rgba(123,92,255,0.45), transparent 70%); filter:blur(16px); border-radius:50%; z-index:0; animation:glowPulse 3s ease-in-out infinite; }
    .nyxia-img { position:relative; z-index:2; height:75vh; max-height:680px; object-fit:contain; filter:drop-shadow(0 0 40px rgba(123,92,255,0.5)) drop-shadow(0 0 80px rgba(90,108,255,0.2)); animation:nyxiaFloat 4s ease-in-out infinite; }
    @keyframes nyxiaFloat { 0%,100%{transform:translateY(0px);} 50%{transform:translateY(-14px);} }
    .content-side { flex:1; max-width:480px; padding:0 48px; animation:contentIn 1.4s cubic-bezier(0.22,1,0.36,1) 0.2s both; }
    @keyframes contentIn { from{opacity:0;transform:translateX(30px);} to{opacity:1;transform:none;} }
    .eyebrow { font-size:11px; font-weight:600; letter-spacing:3px; text-transform:uppercase; color:var(--p3); margin-bottom:16px; opacity:0.8; }
    .title { font-family:'Cormorant Garamond',serif; font-size:clamp(34px,5vw,54px); font-weight:300; line-height:1.1; color:#fff; margin-bottom:16px; }
    .title em { font-style:italic; background:linear-gradient(135deg,var(--p3),#c4b5fd,var(--p2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .subtitle { font-size:15px; color:rgba(214,217,240,0.65); line-height:1.8; margin-bottom:40px; font-weight:300; max-width:380px; }
    .btn-glass { position:relative; display:inline-flex; align-items:center; gap:14px; padding:18px 40px; border-radius:60px; font-family:'Outfit',sans-serif; font-size:16px; font-weight:600; color:#fff; cursor:pointer; border:1px solid rgba(163,139,250,0.35); background:rgba(123,92,255,0.12); backdrop-filter:blur(20px); box-shadow:inset 0 1px 0 rgba(255,255,255,0.12), 0 8px 32px rgba(0,0,0,0.3), 0 0 40px rgba(123,92,255,0.2); transition:all 0.35s cubic-bezier(0.22,1,0.36,1); overflow:hidden; }
    .btn-glass::before { content:''; position:absolute; top:0; left:0; right:0; height:50%; background:linear-gradient(to bottom,rgba(255,255,255,0.08),transparent); border-radius:60px 60px 0 0; pointer-events:none; }
    .btn-glass:hover { background:rgba(123,92,255,0.22); border-color:rgba(163,139,250,0.6); box-shadow:0 0 60px rgba(123,92,255,0.45); transform:translateY(-3px) scale(1.02); }
    .btn-icon { font-size:22px; flex-shrink:0; }
    .btn-text-wrap { display:flex; flex-direction:column; align-items:flex-start; gap:1px; }
    .btn-label { font-size:16px; font-weight:600; }
    .btn-sub { font-size:11px; font-weight:400; color:rgba(214,217,240,0.6); }
    .btn-arrow { margin-left:auto; font-size:18px; opacity:0.6; transition:transform 0.3s ease; }
    .btn-glass:hover .btn-arrow { transform:translateX(4px); opacity:1; }
    .badge-wrap { display:flex; align-items:center; gap:10px; margin-top:24px; }
    .badge { display:inline-flex; align-items:center; gap:6px; padding:5px 12px; border-radius:50px; font-size:11px; font-weight:500; color:rgba(214,217,240,0.6); border:1px solid rgba(123,92,255,0.15); background:rgba(123,92,255,0.06); }
    .badge::before { content:''; width:5px; height:5px; border-radius:50%; background:var(--dot-color,#00E676); flex-shrink:0; }
    @media(max-width:860px) { .scene{flex-direction:column;justify-content:flex-end;} .nyxia-side{width:100%;height:52vh;} .nyxia-img{height:50vh;} .content-side{padding:0 24px 40px;text-align:center;max-width:100%;} .badge-wrap{justify-content:center;} }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="particles" id="particles"></div>
  <div class="scene">
    <div class="nyxia-side">
      <div class="nyxia-glow"></div>
      <div class="nyxia-floor-glow"></div>
      <img src="/Neuro-Alchimie NyXia Transparent.png" alt="NyXia" class="nyxia-img">
    </div>
    <div class="content-side">
      <div class="eyebrow">✨ Transformation Intérieure</div>
      <h1 class="title">Exercices<br><em>Neuro-Alchimiques</em></h1>
      <p class="subtitle">
        NyXia t'accompagne à travers des exercices de transformation profonde.<br>
        Scan corporel, ancrage, respiration, lettre à soi-même…<br>
        Chaque exercice est une invitation à émerger. 💜
      </p>
      <button class="btn-glass" id="btn-start">
        <span class="btn-icon">✨</span>
        <span class="btn-text-wrap">
          <span class="btn-label">Commencer avec NyXia</span>
          <span class="btn-sub">Méthode A.M.I.E. · Neuro-Alchimie</span>
        </span>
        <span class="btn-arrow">→</span>
      </button>
      <div class="badge-wrap">
        <span class="badge" style="--dot-color:#a78bfa">✨ Émergence</span>
        <span class="badge" style="--dot-color:#F4C842">✦ Plan Accompagnement</span>
      </div>
    </div>
  </div>
  <script>
    document.getElementById("btn-start").addEventListener("click", function() {
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: "nyxia_suggest",
          text: "Je voudrais faire un exercice neuro-alchimique. Dis-moi comment tu te sens en ce moment pour choisir ensemble le bon exercice du Miroir."
        }, "*");
      }
    });
    var c = document.getElementById("particles");
    var cl = ["#a78bfa","#7B5CFF","#5A6CFF","#c4b5fd","#ffffff"];
    for (var i = 0; i < 28; i++) {
      var p = document.createElement("div");
      p.className = "particle";
      var s = Math.random() * 3 + 1;
      p.style.cssText = "width:"+s+"px;height:"+s+"px;left:"+(Math.random()*100)+"%;bottom:"+(Math.random()*-20)+"%;animation-duration:"+(Math.random()*12+8)+"s;animation-delay:"+(Math.random()*10)+"s;";
      p.style.background = cl[Math.floor(Math.random()*cl.length)];
      c.appendChild(p);
    }
  </script>
</body>
</html>
