<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retrouver une amie dans le Miroir™ — NyXia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --p: #7B5CFF;
      --p2: #5A6CFF;
      --p3: #a78bfa;
      --glow: rgba(123,92,255,0.6);
      --gold: #F4C842;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #060a18;
      font-family: 'Outfit', sans-serif;
      color: #fff;
    }

    /* ── FOND ANIMÉ ── */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: radial-gradient(ellipse 80% 60% at 60% 50%, rgba(60,20,120,0.55) 0%, transparent 70%),
                  radial-gradient(ellipse 50% 40% at 20% 80%, rgba(30,10,80,0.4) 0%, transparent 60%),
                  #060a18;
    }

    /* Particules flottantes */
    .particles {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      border-radius: 50%;
      background: var(--p3);
      opacity: 0;
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      0%   { opacity: 0; transform: translateY(0) scale(0); }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.2; }
      100% { opacity: 0; transform: translateY(-100vh) scale(1.5); }
    }

    /* ── LAYOUT ── */
    .scene {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
    }

    /* ── NYXIA IMAGE ── */
    .nyxia-side {
      position: relative;
      flex-shrink: 0;
      width: 480px;
      height: 100vh;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      animation: nyxiaIn 1.2s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes nyxiaIn {
      from { opacity: 0; transform: translateX(-40px); }
      to   { opacity: 1; transform: none; }
    }

    /* Glow derrière NyXia */
    .nyxia-glow {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 420px;
      height: 85%;
      background: radial-gradient(ellipse 70% 80% at 50% 60%,
        rgba(123,92,255,0.45) 0%,
        rgba(90,108,255,0.25) 30%,
        rgba(60,20,120,0.1) 60%,
        transparent 75%);
      filter: blur(24px);
      animation: glowPulse 3s ease-in-out infinite;
      z-index: 1;
    }

    @keyframes glowPulse {
      0%, 100% { opacity: 0.8; transform: translateX(-50%) scaleY(1); }
      50%       { opacity: 1;   transform: translateX(-50%) scaleY(1.04); }
    }

    /* Halo sol */
    .nyxia-floor-glow {
      position: absolute;
      bottom: -20px;
      left: 50%;
      transform: translateX(-50%);
      width: 340px;
      height: 60px;
      background: radial-gradient(ellipse 100% 100% at 50% 50%, rgba(123,92,255,0.5), transparent 70%);
      filter: blur(16px);
      border-radius: 50%;
      z-index: 0;
      animation: glowPulse 3s ease-in-out infinite;
    }

    .nyxia-img {
      position: relative;
      z-index: 2;
      height: 92vh;
      max-height: 860px;
      object-fit: contain;
      object-position: bottom;
      filter: drop-shadow(0 0 40px rgba(123,92,255,0.5)) drop-shadow(0 0 80px rgba(90,108,255,0.2));
      animation: nyxiaFloat 4s ease-in-out infinite;
      transform-origin: bottom center;
    }

    @keyframes nyxiaFloat {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-12px); }
    }

    /* ── CONTENU DROITE ── */
    .content-side {
      flex: 1;
      max-width: 480px;
      padding: 0 48px;
      animation: contentIn 1.4s cubic-bezier(0.22,1,0.36,1) 0.2s both;
    }

    @keyframes contentIn {
      from { opacity: 0; transform: translateX(30px); }
      to   { opacity: 1; transform: none; }
    }

    .eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--p3);
      margin-bottom: 16px;
      opacity: 0.8;
    }

    .title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(36px, 5vw, 56px);
      font-weight: 300;
      line-height: 1.1;
      color: #fff;
      margin-bottom: 8px;
    }
    .title em {
      font-style: italic;
      background: linear-gradient(135deg, var(--p3), #c4b5fd, var(--p2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .title-tm {
      font-size: 18px;
      vertical-align: super;
      -webkit-text-fill-color: var(--p3);
      opacity: 0.7;
    }

    .subtitle {
      font-size: 15px;
      color: rgba(214,217,240,0.65);
      line-height: 1.7;
      margin-bottom: 40px;
      font-weight: 300;
      max-width: 380px;
    }

    /* ── BOUTON VITRÉ ── */
    .btn-glass {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 14px;
      padding: 18px 40px;
      border-radius: 60px;
      text-decoration: none;
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.3px;
      cursor: pointer;
      border: none;
      background: none;
      outline: none;

      /* Verre dépoli */
      background: rgba(123,92,255,0.12);
      backdrop-filter: blur(20px) saturate(1.5);
      -webkit-backdrop-filter: blur(20px) saturate(1.5);
      border: 1px solid rgba(163,139,250,0.35);

      /* Glow */
      box-shadow:
        0 0 0 0 rgba(123,92,255,0),
        inset 0 1px 0 rgba(255,255,255,0.12),
        0 8px 32px rgba(0,0,0,0.3),
        0 0 40px rgba(123,92,255,0.2);

      transition: all 0.35s cubic-bezier(0.22,1,0.36,1);
      overflow: hidden;
    }

    /* Reflet interne */
    .btn-glass::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 50%;
      background: linear-gradient(to bottom, rgba(255,255,255,0.08), transparent);
      border-radius: 60px 60px 0 0;
      pointer-events: none;
    }

    /* Shimmer au hover */
    .btn-glass::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -60%;
      width: 40%;
      height: 200%;
      background: linear-gradient(105deg, transparent, rgba(255,255,255,0.18), transparent);
      transform: skewX(-15deg);
      transition: left 0.5s ease;
      pointer-events: none;
    }

    .btn-glass:hover::after {
      left: 130%;
    }

    .btn-glass:hover {
      background: rgba(123,92,255,0.22);
      border-color: rgba(163,139,250,0.6);
      box-shadow:
        0 0 0 4px rgba(123,92,255,0.12),
        inset 0 1px 0 rgba(255,255,255,0.18),
        0 12px 48px rgba(0,0,0,0.35),
        0 0 60px rgba(123,92,255,0.45),
        0 0 100px rgba(90,108,255,0.2);
      transform: translateY(-3px) scale(1.02);
    }

    .btn-glass:active {
      transform: translateY(-1px) scale(1.005);
    }

    .btn-icon {
      font-size: 22px;
      filter: drop-shadow(0 0 8px rgba(163,139,250,0.8));
      flex-shrink: 0;
    }

    .btn-text-wrap { display: flex; flex-direction: column; align-items: flex-start; gap: 1px; }
    .btn-label { font-size: 16px; font-weight: 600; }
    .btn-sub { font-size: 11px; font-weight: 400; color: rgba(214,217,240,0.6); letter-spacing: 0.5px; }

    .btn-arrow {
      margin-left: auto;
      font-size: 18px;
      opacity: 0.6;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }
    .btn-glass:hover .btn-arrow {
      transform: translateX(4px);
      opacity: 1;
    }

    /* Badge */
    .badge-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 24px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 50px;
      font-size: 11px;
      font-weight: 500;
      color: rgba(214,217,240,0.6);
      border: 1px solid rgba(123,92,255,0.15);
      background: rgba(123,92,255,0.06);
    }
    .badge::before {
      content: '';
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--green, #00E676);
      flex-shrink: 0;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 860px) {
      .scene { flex-direction: column; justify-content: flex-end; gap: 0; }
      .nyxia-side { width: 100%; height: 55vh; justify-content: center; }
      .nyxia-img { height: 54vh; }
      .content-side { padding: 0 24px 40px; text-align: center; max-width: 100%; }
      .subtitle { margin: 0 auto 32px; }
      .badge-wrap { justify-content: center; }
    }
  </style>
</head>
<body>

  <div class="bg"></div>

  <!-- Particules -->
  <div class="particles" id="particles"></div>

  <div class="scene">

    <!-- NyXia -->
    <div class="nyxia-side">
      <div class="nyxia-glow"></div>
      <div class="nyxia-floor-glow"></div>
      <img src="/NyXia-27gauche.png" alt="NyXia" class="nyxia-img">
    </div>

    <!-- Contenu -->
    <div class="content-side">
      <div class="eyebrow">✦ Parcours d'Intégration</div>
      <h1 class="title">
        <em>Retrouver une amie</em><br>
        dans le Miroir<span class="title-tm">™</span>
      </h1>
      <p class="subtitle">
        Ton espace de transformation t'attend.<br>
        Entre dans ton parcours Miroir et continue à émerger.
      </p>

      <a href="https://www.lemiroirnyxia.com/fr/login" target="_blank" rel="noopener" class="btn-glass">
        <span class="btn-icon">🪞</span>
        <span class="btn-text-wrap">
          <span class="btn-label">Entrer dans mon Espace Miroir</span>
          <span class="btn-sub">Retrouver une amie dans le Miroir™ · Parcours d'Intégration</span>
        </span>
        <span class="btn-arrow">→</span>
      </a>

      <div class="badge-wrap">
        <span class="badge">Accès sécurisé</span>
        <span class="badge" style="--green:#F4C842">✦ Émergence en cours</span>
      </div>
    </div>

  </div>

  <script>
    // Générer les particules flottantes
    const container = document.getElementById('particles');
    for (let i = 0; i < 28; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 3 + 1;
      p.style.cssText = `
        width: ${size}px;
        height: ${size}px;
        left: ${Math.random() * 100}%;
        bottom: ${Math.random() * -20}%;
        animation-duration: ${Math.random() * 12 + 8}s;
        animation-delay: ${Math.random() * 10}s;
        opacity: 0;
      `;
      // Varier les couleurs
      const colors = ['#a78bfa','#7B5CFF','#5A6CFF','#c4b5fd','#F4C842'];
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      container.appendChild(p);
    }
  </script>

</body>
</html>
